name: 自动打包+发布Excel比对工具
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ] # 推送v开头的标签自动触发发布
  workflow_dispatch: # 手动触发

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-latest, macos-latest, ubuntu-latest ]
        python-version: [ "3.10" ]

    steps:
    - uses: actions/checkout@v4
    
    - name: 设置Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
    
    - name: 安装依赖
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt pyinstaller
    
    - name: 打包程序
      run: |
        pyinstaller -F -w --clean main.py
    
    - name: 重命名输出文件
      shell: bash
      run: |
        if [ "${{ matrix.os }}" = "windows-latest" ]; then
          mv dist/main.exe dist/Excel比对工具_Windows.exe
        elif [ "${{ matrix.os }}" = "macos-latest" ]; then
          mv dist/main dist/Excel比对工具_Mac
        else
          mv dist/main dist/Excel比对工具_Linux
        fi
    
    - name: 上传打包成品
      uses: actions/upload-artifact@v4
      with:
        name: 打包结果_${{ matrix.os }}
        path: dist/
        retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') # 只有打v开头的标签才触发发布
    steps:
      - name: 下载所有平台打包结果
        uses: actions/download-artifact@v4
        with:
          path: dist/
      
      - name: 整理发布文件
        run: |
          mkdir release
          cp dist/打包结果_Windows/Excel比对工具_Windows.exe release/
          cp dist/打包结果_Mac/Excel比对工具_Mac release/
          cp dist/打包结果_Linux/Excel比对工具_Linux release/
      
      - name: 自动发布到GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Excel比对工具 ${{ github.ref_name }}
          body: |
            ## 功能特性
            ✅ 支持多主键/辅助主键精准匹配
            ✅ 完全保留左表结构、行顺序、所有原始数据
            ✅ 差异自动标注：绿色新增/黄色修改/红色删除+自动批注
            ✅ 支持按行号比对模式
            ✅ 导出Excel和左表格式完全一致，可直接使用
            
            ## 使用说明
            - Windows版本：直接双击运行即可
            - Mac版本：首次运行右键点击选择「打开」，或终端执行 `chmod +x Excel比对工具_Mac && ./Excel比对工具_Mac`
            - Linux版本：终端执行 `chmod +x Excel比对工具_Linux && ./Excel比对工具_Linux`
          files: release/*
          token: ${{ secrets.GITHUB_TOKEN }}